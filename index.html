<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f5ede0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="우리의 공간" />
  <title>우리의 공간 🤍</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

    // ✅ 여기에 Firebase 설정을 붙여넣으세요
    const firebaseConfig = {
      apiKey: "AIzaSyCr2M0VRF7AzkC4eOS3EfNFUXIcWSjpxeA",
      authDomain: "love-story-ddfc7.firebaseapp.com",
      projectId: "love-story-ddfc7",
      storageBucket: "love-story-ddfc7.firebasestorage.app",
      messagingSenderId: "434579037902",
      appId: "1:434579037902:web:c49fa1101ad8f8e09a3a9f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window._db = db;
    window._storage = storage;
    window._firebase = { collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, ref, uploadBytes, getDownloadURL };

    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf8f3;
      --cream2: #f9f2ea;
      --cream3: #f5ede0;
      --cream4: #f0e4d4;
      --cream5: #e8d9c8;
      --cream6: #e8cdb5;
      --brown1: #5c3d26;
      --brown2: #7a4f32;
      --brown3: #a07a5c;
      --brown4: #c4a882;
      --accent: #c4895a;
      --accent-dark: #b07848;
      --text: #3a2e25;
      --card: #fffaf5;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--cream3);
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      color: var(--text);
      overscroll-behavior: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--cream);
      position: relative;
    }

    /* ── Header ── */
    .header {
      background: var(--cream3);
      padding: 52px 20px 14px;
      text-align: center;
      border-bottom: 0.5px solid var(--cream5);
      flex-shrink: 0;
    }
    .dday-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .dday-pill {
      background: var(--cream6);
      color: var(--brown2);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: var(--brown1); letter-spacing: 0.5px; }
    .header p { font-size: 11px; color: var(--brown3); margin-top: 2px; }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px 0;
    }

    .section { display: none; padding-bottom: 24px; }
    .section.active { display: block; }

    .sec-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--brown1);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      display: flex;
      background: var(--cream2);
      border-top: 0.5px solid var(--cream5);
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0;
    }
    .bnav {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 2px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .bnav i { font-size: 22px; color: var(--brown4); transition: color .15s; }
    .bnav span { font-size: 9px; color: var(--brown4); transition: color .15s; }
    .bnav.active i, .bnav.active span { color: var(--accent); }
    .bnav span { font-weight: 500; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 0.5px solid var(--cream5);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    /* ── Gallery ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .photo-cell {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: var(--cream4);
      border: 0.5px solid var(--cream5);
    }
    .photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-cell .add-label {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 4px; color: var(--brown4);
    }
    .photo-cell .add-label i { font-size: 24px; }
    .photo-cell .add-label span { font-size: 10px; }
    .photo-cell .photo-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(92,61,38,.45); color: white;
      font-size: 10px; text-align: center; padding: 3px;
    }
    #photo-input { display: none; }

    /* ── Diary / Letters ── */
    .meta-row { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .meta-date { font-size: 10px; color: var(--brown3); }
    .meta-who {
      font-size: 10px; background: var(--cream6); color: var(--brown2);
      padding: 2px 8px; border-radius: 10px;
    }
    .card-text { font-size: 13px; color: var(--brown1); line-height: 1.75; }
    .letter-text { font-size: 13px; color: var(--brown1); line-height: 1.85; font-style: italic; }
    .letter-date { font-size: 10px; color: var(--brown4); margin-top: 8px; text-align: right; }

    .pill-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
    .pill-tabs::-webkit-scrollbar { display: none; }
    .ptab {
      background: var(--cream4); border: 0.5px solid var(--cream5);
      border-radius: 20px; padding: 6px 14px; font-size: 12px;
      color: var(--brown2); cursor: pointer; white-space: nowrap;
      font-family: inherit;
    }
    .ptab.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Write area ── */
    .write-area {
      background: var(--card);
      border: 0.5px solid var(--cream5);
      border-radius: 14px;
      padding: 14px;
      margin-top: 10px;
    }
    .write-area textarea {
      width: 100%; border: none; background: transparent;
      font-size: 13px; color: var(--brown1); resize: none;
      outline: none; font-family: inherit; line-height: 1.7;
    }
    .write-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .who-select {
      background: var(--cream4); border: 0.5px solid var(--cream5);
      border-radius: 8px; padding: 5px 10px; font-size: 12px;
      color: var(--brown2); font-family: inherit; outline: none;
    }
    .submit-btn {
      background: var(--accent); color: white; border: none;
      border-radius: 10px; padding: 8px 18px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .submit-btn:active { background: var(--accent-dark); }

    /* ── Bucket ── */
    .bucket-item {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; background: var(--card);
      border: 0.5px solid var(--cream5); border-radius: 12px;
      cursor: pointer; margin-bottom: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .bcheck {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid var(--brown4); display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s;
    }
    .bucket-item.done .bcheck { background: var(--accent); border-color: var(--accent); color: white; }
    .btext { font-size: 13px; color: var(--brown1); flex: 1; }
    .bucket-item.done .btext { color: var(--brown3); text-decoration: line-through; }
    .bcategory { font-size: 10px; color: var(--brown4); }

    /* ── Date Plan ── */
    .plan-card {
      background: var(--card); border: 0.5px solid var(--cream5);
      border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .plan-card.done { opacity: .6; }
    .plan-top { display: flex; gap: 10px; }
    .plan-emoji { font-size: 24px; flex-shrink: 0; }
    .plan-info { flex: 1; min-width: 0; }
    .plan-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
    .plan-title { font-size: 14px; font-weight: 600; color: var(--brown1); }
    .plan-card.done .plan-title { text-decoration: line-through; color: var(--brown3); }
    .plan-meta { font-size: 11px; color: var(--brown3); margin-top: 2px; }
    .plan-detail { font-size: 12px; color: #7a5c42; margin-top: 8px; line-height: 1.6; padding-top: 8px; border-top: 0.5px solid var(--cream5); }
    .plan-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .tag { font-size: 11px; background: var(--cream4); color: #8a5c3a; padding: 3px 9px; border-radius: 10px; }
    .status-pill { font-size: 11px; padding: 3px 9px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .status-upcoming { background: #e8f4e8; color: #4a7a4a; }
    .status-done { background: var(--cream6); color: var(--brown2); }

    /* ── Map ── */
    .map-placeholder {
      background: var(--cream4); border-radius: 14px;
      border: 0.5px solid var(--cream5); height: 200px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; color: var(--brown3);
      margin-bottom: 12px;
    }
    .map-placeholder i { font-size: 36px; }
    .map-placeholder p { font-size: 12px; }
    .place-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: var(--card);
      border: 0.5px solid var(--cream5); border-radius: 12px; margin-bottom: 8px;
    }
    .place-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
    .place-name { font-size: 13px; color: var(--brown1); flex: 1; }
    .place-date { font-size: 11px; color: var(--brown3); }

    /* ── Anniversary ── */
    .anni-card {
      background: var(--card); border: 0.5px solid var(--cream5);
      border-radius: 14px; padding: 14px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .anni-icon { font-size: 28px; flex-shrink: 0; }
    .anni-info { flex: 1; }
    .anni-name { font-size: 14px; font-weight: 600; color: var(--brown1); }
    .anni-sub { font-size: 11px; color: var(--brown3); margin-top: 2px; }
    .anni-count { text-align: right; }
    .anni-d { font-size: 20px; font-weight: 700; color: var(--accent); }
    .anni-label { font-size: 10px; color: var(--brown3); }

    /* ── Add button ── */
    .add-btn {
      width: 100%; padding: 12px;
      background: var(--cream4); border: 0.5px dashed var(--brown4);
      border-radius: 12px; color: var(--brown3); font-size: 13px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px; font-family: inherit; margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: var(--cream5); }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--brown3); font-size: 13px; line-height: 1.8;
    }
    .empty i { font-size: 40px; display: block; margin-bottom: 10px; color: var(--brown4); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--brown1); color: white; font-size: 13px;
      padding: 10px 20px; border-radius: 20px; z-index: 999;
      opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── Loading ── */
    .loading {
      position: fixed; inset: 0; background: var(--cream);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; z-index: 9999;
    }
    .loading h2 { font-size: 20px; color: var(--brown1); }
    .loading p { font-size: 13px; color: var(--brown3); }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--cream5);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--cream); border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      width: 100%; max-width: 480px;
    }
    .modal h3 { font-size: 16px; font-weight: 600; color: var(--brown1); margin-bottom: 14px; }
    .modal input, .modal textarea, .modal select {
      width: 100%; background: var(--cream4); border: 0.5px solid var(--cream5);
      border-radius: 10px; padding: 10px 12px; font-size: 13px;
      color: var(--brown1); font-family: inherit; outline: none; margin-bottom: 10px;
    }
    .modal textarea { resize: none; }
    .modal-row { display: flex; gap: 8px; }
    .modal-row input, .modal-row select { flex: 1; }
    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .modal-cancel {
      flex: 1; background: var(--cream4); border: 0.5px solid var(--cream5);
      border-radius: 10px; padding: 10px; font-size: 14px; color: var(--brown2);
      cursor: pointer; font-family: inherit;
    }
    .modal-save {
      flex: 2; background: var(--accent); border: none;
      border-radius: 10px; padding: 10px; font-size: 14px; color: white;
      cursor: pointer; font-family: inherit; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <h2>우리의 공간 🤍</h2>
  <p>불러오는 중...</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- App -->
<div class="app">
  <div class="header">
    <div class="dday-row">
      <span class="dday-pill" id="main-dday">D+0 🤍</span>
      <span class="dday-pill" id="next-anni-pill">기념일 로딩중 🎂</span>
    </div>
    <h1>우리의 공간</h1>
    <p>함께하는 모든 순간을 기록해요</p>
  </div>

  <div class="content" id="content">

    <!-- 갤러리 -->
    <div class="section active" id="section-gallery">
      <div class="sec-title"><i class="ti ti-photo"></i> 우리의 사진</div>
      <div class="photo-grid" id="photo-grid">
        <div class="photo-cell" onclick="document.getElementById('photo-input').click()">
          <div class="add-label"><i class="ti ti-plus"></i><span>추가</span></div>
        </div>
      </div>
      <input type="file" id="photo-input" accept="image/*" multiple />
    </div>

    <!-- 일기 -->
    <div class="section" id="section-diary">
      <div class="sec-title"><i class="ti ti-notebook"></i> 우리의 일기</div>
      <div id="diary-list"></div>
      <div class="write-area">
        <textarea id="diary-input" rows="3" placeholder="오늘 하루를 기록해요..."></textarea>
        <div class="write-footer">
          <select class="who-select" id="diary-who">
            <option>나</option>
            <option>우리</option>
          </select>
          <button class="submit-btn" onclick="saveDiary()">저장하기</button>
        </div>
      </div>
    </div>

    <!-- 편지함 -->
    <div class="section" id="section-letters">
      <div class="sec-title"><i class="ti ti-mail"></i> 편지함</div>
      <div class="pill-tabs">
        <button class="ptab active" onclick="filterLetters('all',this)">전체</button>
        <button class="ptab" onclick="filterLetters('sent',this)">내가 쓴</button>
        <button class="ptab" onclick="filterLetters('received',this)">받은</button>
      </div>
      <div id="letter-list"></div>
      <div class="write-area">
        <textarea id="letter-input" rows="3" placeholder="편지를 써보세요..."></textarea>
        <div class="write-footer">
          <select class="who-select" id="letter-who">
            <option value="sent">내가 쓴</option>
            <option value="received">받은</option>
          </select>
          <button class="submit-btn" onclick="saveLetter()">보내기</button>
        </div>
      </div>
    </div>

    <!-- 버킷리스트 -->
    <div class="section" id="section-bucket">
      <div class="sec-title"><i class="ti ti-heart"></i> 버킷리스트</div>
      <div id="bucket-list"></div>
      <button class="add-btn" onclick="openModal('bucket')"><i class="ti ti-plus"></i> 항목 추가하기</button>
    </div>

    <!-- 데이트 플랜 -->
    <div class="section" id="section-plan">
      <div class="sec-title"><i class="ti ti-calendar-event"></i> 데이트 플랜</div>
      <div id="plan-list"></div>
      <button class="add-btn" onclick="openModal('plan')"><i class="ti ti-plus"></i> 플랜 추가하기</button>
    </div>

    <!-- 지도 -->
    <div class="section" id="section-map">
      <div class="sec-title"><i class="ti ti-map"></i> 우리가 다녀온 곳</div>
      <div class="map-placeholder">
        <i class="ti ti-map-2"></i>
        <p>다녀온 장소를 추가해보세요</p>
      </div>
      <div id="place-list"></div>
      <button class="add-btn" onclick="openModal('place')"><i class="ti ti-plus"></i> 장소 추가하기</button>
    </div>

    <!-- 기념일 -->
    <div class="section" id="section-anni">
      <div class="sec-title"><i class="ti ti-cake"></i> 기념일</div>
      <div id="anni-list"></div>
      <button class="add-btn" onclick="openModal('anni')"><i class="ti ti-plus"></i> 기념일 추가하기</button>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="bnav active" onclick="showTab('gallery')" id="tab-gallery"><i class="ti ti-photo"></i><span>갤러리</span></button>
    <button class="bnav" onclick="showTab('diary')" id="tab-diary"><i class="ti ti-notebook"></i><span>일기</span></button>
    <button class="bnav" onclick="showTab('letters')" id="tab-letters"><i class="ti ti-mail"></i><span>편지함</span></button>
    <button class="bnav" onclick="showTab('bucket')" id="tab-bucket"><i class="ti ti-heart"></i><span>버킷</span></button>
    <button class="bnav" onclick="showTab('plan')" id="tab-plan"><i class="ti ti-calendar-event"></i><span>데이트</span></button>
    <button class="bnav" onclick="showTab('map')" id="tab-map"><i class="ti ti-map-pin"></i><span>지도</span></button>
    <button class="bnav" onclick="showTab('anni')" id="tab-anni"><i class="ti ti-cake"></i><span>기념일</span></button>
  </nav>
</div>

<!-- Modals -->
<div class="modal-backdrop" id="modal-bucket">
  <div class="modal">
    <h3>버킷리스트 추가</h3>
    <input type="text" id="bucket-text" placeholder="하고 싶은 것을 적어요" />
    <input type="text" id="bucket-cat" placeholder="카테고리 (예: 여행, 데이트)" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('bucket')">취소</button>
      <button class="modal-save" onclick="saveBucket()">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-plan">
  <div class="modal">
    <h3>데이트 플랜 추가</h3>
    <input type="text" id="plan-emoji-input" placeholder="이모지 (예: 🌊)" maxlength="2" />
    <input type="text" id="plan-title-input" placeholder="제목 (예: 부산 바다 여행)" />
    <input type="text" id="plan-when-input" placeholder="언제? (예: 7월 중순 · 1박 2일)" />
    <textarea id="plan-detail-input" rows="2" placeholder="상세 계획을 적어요"></textarea>
    <input type="text" id="plan-tags-input" placeholder="태그 (쉼표로 구분, 예: 여행, 바다)" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('plan')">취소</button>
      <button class="modal-save" onclick="savePlan()">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-place">
  <div class="modal">
    <h3>장소 추가</h3>
    <input type="text" id="place-name-input" placeholder="장소 이름 (예: 경복궁)" />
    <input type="date" id="place-date-input" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('place')">취소</button>
      <button class="modal-save" onclick="savePlace()">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-anni">
  <div class="modal">
    <h3>기념일 추가</h3>
    <input type="text" id="anni-emoji-input" placeholder="이모지 (예: ❤️)" maxlength="2" />
    <input type="text" id="anni-name-input" placeholder="기념일 이름 (예: 사귄 날)" />
    <input type="date" id="anni-date-input" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('anni')">취소</button>
      <button class="modal-save" onclick="saveAnni()">추가하기</button>
    </div>
  </div>
</div>

<script>
const TABS = ['gallery','diary','letters','bucket','plan','map','anni'];

function showTab(tab) {
  TABS.forEach(t => {
    document.getElementById('section-'+t).classList.remove('active');
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('section-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('content').scrollTop = 0;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function openModal(name) { document.getElementById('modal-'+name).classList.add('open'); }
function closeModal(name) { document.getElementById('modal-'+name).classList.remove('open'); }

function fmt(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

// ── D-day ──
function daysUntil(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), d.getMonth(), d.getDate());
  if (next < today) next.setFullYear(today.getFullYear()+1);
  return Math.round((next - today) / 86400000);
}
function daysSince(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(d); start.setHours(0,0,0,0);
  return Math.round((today - start) / 86400000);
}

// ── Anniversary render ──
let anniData = [];
function renderAnni(list) {
  anniData = list;
  const el = document.getElementById('anni-list');
  if (!list.length) { el.innerHTML = '<div class="empty"><i class="ti ti-cake"></i>기념일을 추가해보세요</div>'; return; }
  el.innerHTML = list.map(a => {
    const d = new Date(a.date);
    const diff = daysUntil(d);
    const since = new Date(a.date) < new Date() ? `D+${daysSince(new Date(a.date))} · ` : '';
    const label = diff === 0 ? '오늘!' : `D-${diff}`;
    return `<div class="anni-card">
      <div class="anni-icon">${a.emoji||'🎂'}</div>
      <div class="anni-info"><div class="anni-name">${a.name}</div><div class="anni-sub">${since}${d.getMonth()+1}월 ${d.getDate()}일</div></div>
      <div class="anni-count"><div class="anni-d">${label}</div><div class="anni-label">${diff===0?'🎉':'남음'}</div></div>
    </div>`;
  }).join('');

  // Update header pills
  if (list.length) {
    const sorted = [...list].sort((a,b) => daysUntil(new Date(a.date)) - daysUntil(new Date(b.date)));
    const nearest = sorted[0];
    document.getElementById('next-anni-pill').textContent = `D-${daysUntil(new Date(nearest.date))} 🎂`;
    const couple = list.find(a => a.name.includes('사귄') || a.name.includes('만난'));
    if (couple) document.getElementById('main-dday').textContent = `D+${daysSince(new Date(couple.date))} 🤍`;
  }
}

// ── Letter filter ──
let letterFilter = 'all';
let allLetters = [];
function filterLetters(type, btn) {
  letterFilter = type;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLetters(allLetters);
}
function renderLetters(list) {
  allLetters = list;
  const el = document.getElementById('letter-list');
  const filtered = letterFilter === 'all' ? list : list.filter(l => l.type === letterFilter);
  if (!filtered.length) { el.innerHTML = '<div class="empty"><i class="ti ti-mail"></i>편지를 써보세요</div>'; return; }
  el.innerHTML = filtered.map(l => `
    <div class="card">
      <div class="letter-from">${l.type==='sent'?'💌 내가 쓴 편지':'💝 받은 편지'}</div>
      <div class="letter-text">${l.text}</div>
      <div class="letter-date">${fmt(l.date)}</div>
    </div>`).join('');
}

// ── Bucket toggle ──
async function toggleBucket(id, isDone) {
  const { doc, updateDoc } = window._firebase;
  await updateDoc(doc(window._db, 'bucket', id), { done: !isDone });
}

// ── Plan toggle ──
async function togglePlan(id, isDone) {
  const { doc, updateDoc } = window._firebase;
  await updateDoc(doc(window._db, 'plans', id), { done: !isDone });
}

// ── Save functions ──
async function saveDiary() {
  const text = document.getElementById('diary-input').value.trim();
  if (!text) return;
  const who = document.getElementById('diary-who').value;
  const { collection, addDoc } = window._firebase;
  await addDoc(collection(window._db, 'diary'), { text, who, date: new Date().toISOString() });
  document.getElementById('diary-input').value = '';
  toast('일기가 저장됐어요 🤍');
}

async function saveLetter() {
  const text = document.getElementById('letter-input').value.trim();
  if (!text) return;
  const type = document.getElementById('letter-who').value;
  const { collection, addDoc } = window._firebase;
  await addDoc(collection(window._db, 'letters'), { text, type, date: new Date().toISOString() });
  document.getElementById('letter-input').value = '';
  toast('편지가 저장됐어요 💌');
}

async function saveBucket() {
  const text = document.getElementById('bucket-text').value.trim();
  if (!text) { toast('내용을 입력해주세요'); return; }
  const cat = document.getElementById('bucket-cat').value.trim() || '기타';
  const { collection, addDoc } = window._firebase;
  await addDoc(collection(window._db, 'bucket'), { text, cat, done: false, date: new Date().toISOString() });
  document.getElementById('bucket-text').value = '';
  document.getElementById('bucket-cat').value = '';
  closeModal('bucket');
  toast('버킷리스트에 추가됐어요 ✨');
}

async function savePlan() {
  const title = document.getElementById('plan-title-input').value.trim();
  if (!title) { toast('제목을 입력해주세요'); return; }
  const emoji = document.getElementById('plan-emoji-input').value.trim() || '📅';
  const when = document.getElementById('plan-when-input').value.trim();
  const detail = document.getElementById('plan-detail-input').value.trim();
  const tags = document.getElementById('plan-tags-input').value.split(',').map(t=>t.trim()).filter(Boolean);
  const { collection, addDoc } = window._firebase;
  await addDoc(collection(window._db, 'plans'), { title, emoji, when, detail, tags, done: false, date: new Date().toISOString() });
  ['plan-emoji-input','plan-title-input','plan-when-input','plan-detail-input','plan-tags-input'].forEach(id => document.getElementById(id).value='');
  closeModal('plan');
  toast('데이트 플랜이 추가됐어요 🗓️');
}

async function savePlace() {
  const name = document.getElementById('place-name-input').value.trim();
  if (!name) { toast('장소 이름을 입력해주세요'); return; }
  const date = document.getElementById('place-date-input').value;
  const { collection, addDoc } = window._firebase;
  await addDoc(collection(window._db, 'places'), { name, date, createdAt: new Date().toISOString() });
  document.getElementById('place-name-input').value = '';
  document.getElementById('place-date-input').value = '';
  closeModal('place');
  toast('장소가 추가됐어요 📍');
}

async function saveAnni() {
  const name = document.getElementById('anni-name-input').value.trim();
  const date = document.getElementById('anni-date-input').value;
  if (!name || !date) { toast('이름과 날짜를 입력해주세요'); return; }
  const emoji = document.getElementById('anni-emoji-input').value.trim() || '🎂';
  const { collection, addDoc } = window._firebase;
  await addDoc(collection(window._db, 'anniversaries'), { name, date, emoji, createdAt: new Date().toISOString() });
  ['anni-emoji-input','anni-name-input','anni-date-input'].forEach(id => document.getElementById(id).value='');
  closeModal('anni');
  toast('기념일이 추가됐어요 🎂');
}

// ── Photo upload ──
document.getElementById('photo-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  toast('사진 업로드 중...');
  for (const file of files) {
    const { ref, uploadBytes, getDownloadURL, collection, addDoc } = window._firebase;
    const storageRef = ref(window._storage, `photos/${Date.now()}_${file.name}`);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    await addDoc(collection(window._db, 'photos'), { url, date: new Date().toISOString() });
  }
  toast('사진이 추가됐어요 📸');
  e.target.value = '';
});

// ── Firebase listeners ──
window.addEventListener('firebase-ready', () => {
  const { collection, onSnapshot, query, orderBy } = window._firebase;
  const db = window._db;

  // Diary
  onSnapshot(query(collection(db,'diary'), orderBy('date','desc')), snap => {
    const el = document.getElementById('diary-list');
    const items = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (!items.length) { el.innerHTML = '<div class="empty"><i class="ti ti-notebook"></i>첫 번째 일기를 써보세요</div>'; return; }
    el.innerHTML = items.map(i => `<div class="card">
      <div class="meta-row"><span class="meta-date">${fmt(i.date)}</span><span class="meta-who">${i.who||'나'}</span></div>
      <div class="card-text">${i.text}</div>
    </div>`).join('');
  });

  // Letters
  onSnapshot(query(collection(db,'letters'), orderBy('date','desc')), snap => {
    renderLetters(snap.docs.map(d => ({id:d.id,...d.data()})));
  });

  // Bucket
  onSnapshot(query(collection(db,'bucket'), orderBy('date','asc')), snap => {
    const el = document.getElementById('bucket-list');
    const items = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (!items.length) { el.innerHTML = '<div class="empty"><i class="ti ti-heart"></i>함께하고 싶은 것들을 적어보세요</div>'; return; }
    el.innerHTML = items.map(i => `<div class="bucket-item${i.done?' done':''}" onclick="toggleBucket('${i.id}',${i.done})">
      <div class="bcheck">${i.done?'<i class="ti ti-check" style="font-size:12px"></i>':''}</div>
      <span class="btext">${i.text}</span>
      <span class="bcategory">${i.cat||''}</span>
    </div>`).join('');
  });

  // Plans
  onSnapshot(query(collection(db,'plans'), orderBy('date','desc')), snap => {
    const el = document.getElementById('plan-list');
    const items = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (!items.length) { el.innerHTML = '<div class="empty"><i class="ti ti-calendar-event"></i>데이트 플랜을 추가해보세요</div>'; return; }
    el.innerHTML = items.map(i => `<div class="plan-card${i.done?' done':''}" onclick="togglePlan('${i.id}',${i.done})">
      <div class="plan-top">
        <div class="plan-emoji">${i.emoji||'📅'}</div>
        <div class="plan-info">
          <div class="plan-header">
            <div class="plan-title">${i.title}</div>
            <span class="status-pill ${i.done?'status-done':'status-upcoming'}">${i.done?'완료':'예정'}</span>
          </div>
          <div class="plan-meta">${i.when||''}</div>
          ${i.detail?`<div class="plan-detail">${i.detail}</div>`:''}
          ${i.tags&&i.tags.length?`<div class="plan-tags">${i.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
        </div>
      </div>
    </div>`).join('');
  });

  // Places
  onSnapshot(query(collection(db,'places'), orderBy('createdAt','desc')), snap => {
    const el = document.getElementById('place-list');
    const items = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (!items.length) { el.innerHTML = ''; return; }
    el.innerHTML = items.map(i => `<div class="place-item">
      <div class="place-dot"></div>
      <span class="place-name">${i.name}</span>
      <span class="place-date">${i.date||''}</span>
    </div>`).join('');
  });

  // Photos
  onSnapshot(query(collection(db,'photos'), orderBy('date','desc')), snap => {
    const grid = document.getElementById('photo-grid');
    const items = snap.docs.map(d => ({id:d.id,...d.data()}));
    const addCell = `<div class="photo-cell" onclick="document.getElementById('photo-input').click()"><div class="add-label"><i class="ti ti-plus"></i><span>추가</span></div></div>`;
    if (!items.length) { grid.innerHTML = addCell; return; }
    grid.innerHTML = items.map(i => `<div class="photo-cell"><img src="${i.url}" loading="lazy" /></div>`).join('') + addCell;
  });

  // Anniversaries
  onSnapshot(query(collection(db,'anniversaries'), orderBy('date','asc')), snap => {
    renderAnni(snap.docs.map(d => ({id:d.id,...d.data()})));
  });

  document.getElementById('loading').style.display = 'none';
});
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
